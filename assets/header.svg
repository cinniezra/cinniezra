<svg width="800" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="50%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#f472b6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0"/>
      <animate attributeName="x1" values="-50%;50%;-50%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="50%;150%;50%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <rect width="800" height="180" fill="url(#bg)" rx="6"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="#c084fc" opacity="0.15"/>
  </pattern>
  <rect width="800" height="180" fill="url(#dots)"/>

  <!-- Sparkles around cinni -->
  <text font-family="serif" font-size="14" fill="#f472b6">
    <tspan x="295" y="72">✦</tspan>
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </text>
  <text font-family="serif" font-size="10" fill="#c084fc">
    <tspan x="500" y="65">✦</tspan>
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
  </text>
  <text font-family="serif" font-size="16" fill="#f9a8d4">
    <tspan x="310" y="105">✧</tspan>
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
  </text>
  <text font-family="serif" font-size="8" fill="#e9d5ff">
    <tspan x="488" y="100">✦</tspan>
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
  </text>
  <text font-family="serif" font-size="12" fill="#f472b6">
    <tspan x="280" y="90">·</tspan>
    <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0.2s" repeatCount="indefinite"/>
  </text>
  <text font-family="serif" font-size="12" fill="#c084fc">
    <tspan x="515" y="82">·</tspan>
    <animate attributeName="opacity" values="0;1;0" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
  </text>
  <text font-family="serif" font-size="11" fill="#f9a8d4">
    <tspan x="330" y="60">✧</tspan>
    <animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
  </text>
  <text font-family="serif" font-size="9" fill="#e9d5ff">
    <tspan x="475" y="108">✧</tspan>
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </text>

  <!-- Name -->
  <text x="400" y="95" font-family="'Courier New', monospace" font-size="48" font-weight="bold" fill="url(#nameGrad)" text-anchor="middle">cinni</text>

  <!-- Animated line -->
  <line x1="280" y1="115" x2="520" y2="115" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- Corner accents -->
  <path d="M 20,20 L 20,40 M 20,20 L 40,20" stroke="#c084fc" stroke-width="1" opacity="0.3"/>
  <path d="M 780,20 L 780,40 M 780,20 L 760,20" stroke="#f472b6" stroke-width="1" opacity="0.3"/>
  <path d="M 20,160 L 20,140 M 20,160 L 40,160" stroke="#f472b6" stroke-width="1" opacity="0.3"/>
  <path d="M 780,160 L 780,140 M 780,160 L 760,160" stroke="#c084fc" stroke-width="1" opacity="0.3"/>
</svg>
